<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Blue-to-fire ring gradient -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="30%" stop-color="#0ea5e9"/>
      <stop offset="60%" stop-color="#ff6b00"/>
      <stop offset="85%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Blue ambient glow top-left -->
    <radialGradient id="blueGlow" cx="25%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0f1117" stop-opacity="0"/>
    </radialGradient>
    <!-- Warm glow bottom-right -->
    <radialGradient id="warmGlow" cx="70%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0f1117" stop-opacity="0"/>
    </radialGradient>
    <!-- Spine gold gradient -->
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Deep space background -->
  <circle cx="32" cy="32" r="31" fill="#0f1117"/>
  <circle cx="32" cy="32" r="28" fill="url(#blueGlow)"/>
  <circle cx="32" cy="32" r="28" fill="url(#warmGlow)"/>
  <!-- Ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
  <!-- Lucide BookOpen icon, scaled and positioned -->
  <g transform="translate(14,16) scale(1.5)">
    <!-- Left page complete (blue) — outer edge, top, spine curve, bottom -->
    <path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H3z" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="rgba(56,189,248,0.06)"/>
    <!-- Right page complete (fire) — spine curve, top, outer edge, bottom -->
    <path d="M12 7a4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3V7z" stroke="#ff6b00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="rgba(255,107,0,0.06)"/>
    <!-- Spine (on top, clearly separating the two pages) -->
    <path d="M12 6v16" stroke="url(#spine)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left page code lines (blue tones) -->
    <line x1="4.5" y1="7" x2="9" y2="7" stroke="#38bdf8" stroke-width="0.9" opacity="0.6" stroke-linecap="round"/>
    <line x1="4.5" y1="10" x2="8" y2="10" stroke="#7dd3fc" stroke-width="0.9" opacity="0.45" stroke-linecap="round"/>
    <line x1="4.5" y1="13" x2="9.5" y2="13" stroke="#0ea5e9" stroke-width="0.9" opacity="0.55" stroke-linecap="round"/>
    <!-- Right page code lines (fire tones) -->
    <line x1="15" y1="7" x2="19.5" y2="7" stroke="#ff6b00" stroke-width="0.9" opacity="0.6" stroke-linecap="round"/>
    <line x1="15" y1="10" x2="18.5" y2="10" stroke="#fbbf24" stroke-width="0.9" opacity="0.5" stroke-linecap="round"/>
    <line x1="15" y1="13" x2="19" y2="13" stroke="#f59e0b" stroke-width="0.9" opacity="0.55" stroke-linecap="round"/>
  </g>
  <!-- Spark dots -->
  <circle cx="10" cy="11" r="1.4" fill="#38bdf8" opacity="0.75"/>
  <circle cx="54" cy="12" r="1.2" fill="#ff6b00" opacity="0.75"/>
  <circle cx="52" cy="53" r="1" fill="#f59e0b" opacity="0.6"/>
  <circle cx="12" cy="53" r="1" fill="#0ea5e9" opacity="0.55"/>
</svg>
